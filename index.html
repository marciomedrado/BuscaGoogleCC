<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca Creative Commons - Imagens Creative Commons</title>
    <link rel="stylesheet" href="style.css">
    <!-- Bibliotecas Externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
</head>

<body class="dark-mode">
    <div class="mobile-nav">
        <button id="toggleSidebar" class="mobile-nav-btn">
            <svg viewBox="0 0 24 24">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
            </svg>
            <span>Termos</span>
        </button>
        <button id="showSearch" class="mobile-nav-btn active">
            <svg viewBox="0 0 24 24">
                <path
                    d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
            </svg>
            <span>Busca</span>
        </button>
        <button id="toggleQueue" class="mobile-nav-btn">
            <svg viewBox="0 0 24 24">
                <path
                    d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zM1 2v2h2l3.6 7.59-1.35 2.45c-.16.28-.25.61-.25.96 0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12.9-1.63h7.45c.75 0 1.41-.41 1.75-1.03l3.58-6.49c.08-.14.12-.31.12-.48 0-.55-.45-1-1-1H5.21l-.94-2H1zm16 16c-1.1 0-1.99.9-1.99 2s.89 2 1.99 2 2-.9 2-2-.9-2-2-2z" />
            </svg>
            <span>Fila</span>
        </button>
    </div>

    <div class="app-layout">
        <!-- Barra Lateral de Importação e Termos -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Importar <span>Termos</span></h2>
                <div class="import-controls">
                    <label for="fileInput" class="custom-file-upload">Selecionar Arquivo</label>
                    <input type="file" id="fileInput" accept=".xlsx,.csv,.doc,.docx,.txt,.md" multiple>

                    <div class="terms-config"
                        style="margin-top: 10px; display: flex; align-items: center; gap: 8px; font-size: 0.8rem;">
                        <label for="startTermNumInput">Iniciar em:</label>
                        <input type="number" id="startTermNumInput" value="1" min="1" class="small-input"
                            style="width: 50px;">
                        <button id="addTermTopBtn" class="compact-btn"
                            style="background: #22c55e; color: white; margin-left: auto;"
                            title="Adicionar termo no topo">+ Termo</button>
                    </div>

                    <div class="backup-restaurar-btns">
                        <button id="exportBackupBtn" class="compact-btn" title="Exportar Backup">Backup</button>
                        <button id="importBackupBtn" class="compact-btn" title="Importar Backup">Restaurar</button>
                    </div>
                    <input type="file" id="backupInput" accept=".json" style="display: none;">
                    <div class="sidebar-actions"
                        style="margin-top: 10px; display: flex; flex-direction: column; gap: 5px;">
                        <button id="toggleReviewModeBtn" class="compact-btn" style="background: #a855f7; color: white;"
                            title="Ativar visão de conferência Lado a Lado">Modo Revisão</button>
                    </div>

                    <div class="auto-fill-container"
                        style="margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--glass-border);">
                        <label
                            style="font-size: 0.8rem; display: block; margin-bottom: 5px; color: var(--text-secondary);">Auto-Preencher
                            Fila:</label>
                        <div style="display: flex; gap: 5px;">
                            <select id="autoFillMode" class="small-input"
                                style="flex: 1; font-size: 0.75rem; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); color: white; border-radius: 4px;">
                                <option value="first">Primeira Imagem</option>
                                <option value="random">Imagem Aleatória</option>
                            </select>
                            <button id="autoFillBtn" class="compact-btn" style="background: #22c55e; color: white;"
                                title="Preencher automaticamente espaços vazios">Rodar</button>
                        </div>
                    </div>

                    <div class="find-replace-container">
                        <input type="text" id="findInput" placeholder="Procurar termo...">
                        <input type="text" id="replaceInput" placeholder="Substituir por...">
                        <div class="find-replace-actions">
                            <button id="findBtn" class="compact-btn"
                                title="Localizar próxima ocorrência">Localizar</button>
                            <button id="replaceNextBtn" class="compact-btn" style="display: none; background: #eab308;"
                                title="Substituir ocorrência encontrada">Substituir</button>
                            <button id="replaceAllBtn" class="compact-btn"
                                title="Substituir todas as ocorrências">Trocar Tudo</button>
                        </div>
                    </div>

                    <button id="clearTermsBtn" class="danger-btn" style="display: none;"
                        title="Apagar todos os termos importados">Limpar</button>
                </div>
            </div>
            <div id="termList" class="term-list">
                <!-- Termos aparecerão aqui -->
            </div>
        </aside>

        <!-- Área Principal de Busca -->
        <main class="main-content">
            <header>
                <h1>Busca Creative <span>Commons</span></h1>
            </header>

            <div class="search-box">
                <input type="text" id="searchInput" placeholder="O que você está procurando?">
                <button id="clearSearchBtn" class="clear-search-btn" title="Limpar busca"
                    style="display: none;">&times;</button>
                <button id="searchBtn">Buscar</button>
            </div>

            <div id="results" class="results-grid masonry">
                <!-- Imagens aparecerão aqui -->
                <div class="placeholder-msg">Busque algo ou importe uma lista de termos.</div>
            </div>

            <div id="reviewContainer" class="review-container" style="display: none;">
                <!-- Tabela de revisão lado a lado aparecerá aqui -->
            </div>

            <div id="loadMoreContainer" class="load-more-container"
                style="display: none; text-align: center; margin-top: 2rem;">
                <button id="loadMoreBtn" class="load-more-btn">+ Imagens</button>
            </div>
        </main>

        <!-- Barra de Fila à Direita -->
        <aside class="queue-panel">
            <div class="queue-header">
                <h2>Minha <span>Fila</span> <span id="queueCount" class="badge">0</span></h2>
                <div class="queue-config">
                    <label for="startNumInput">Iniciar em:</label>
                    <input type="number" id="startNumInput" value="1" min="1" class="small-input">
                </div>
                <div class="queue-actions">
                    <button id="downloadZipBtn" class="download-zip-btn" disabled>Baixar ZIP</button>
                    <button id="clearQueueBtn" class="danger-btn" style="display: none;"
                        title="Esvaziar toda a fila">Limpar Fila</button>
                </div>
            </div>
            <div id="queueItems" class="queue-items">
                <!-- Itens da fila aparecerão aqui -->
            </div>
        </aside>

        <footer>
            <p>&copy; 2024 Busca Creative Commons - Feito com ✨</p>
        </footer>

        <button id="backToTop" class="back-to-top" title="Voltar ao Topo">
            <svg viewBox="0 0 24 24">
                <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z" />
            </svg>
        </button>
    </div>
    <script src="app.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuscaGoogleCC - Imagens Creative Commons</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="dark-mode">
    <div class="container">
        <header>
            <h1>BuscaGoogle<span>CC</span></h1>
            <p>Encontre imagens com licença Creative Commons rapidamente.</p>
        </header>

        <main>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="O que você está procurando?">
                <button id="searchBtn">Buscar</button>
            </div>

            <div id="results" class="results-grid">
                <!-- Imagens aparecerão aqui -->
                <div class="placeholder-msg">Digite algo para começar a busca.</div>
            </div>

            <div id="loadMoreContainer" class="load-more-container"
                style="display: none; text-align: center; margin-top: 2rem;">
                <button id="loadMoreBtn" class="load-more-btn">+ Imagens</button>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 BuscaGoogleCC - Feito com ✨</p>
        </footer>

        <button id="backToTop" class="back-to-top" title="Voltar ao Topo">
            <svg viewBox="0 0 24 24">
                <path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z" />
            </svg>
        </button>
    </div>
    <script src="app.js"></script>
</body>

</html>
